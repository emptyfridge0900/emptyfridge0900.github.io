{% extends "DeepThought/templates/base.html" %}

{% block user_custom_stylesheet %}
<link href="{{ get_url(path='code-highlighting.css') }}" rel="stylesheet" />
<style>
  .language-toggle {
    align-items: center;
    gap: 0.35rem;
  }

  .language-toggle .language-toggle__label {
    font-weight: 700;
    letter-spacing: 0;
  }

  .navbar-brand .navbar-item.is-size-5.has-text-weight-bold:empty::before {
    content: "Doosan's Blog";
  }
</style>
{% endblock user_custom_stylesheet %}

{% block user_custom_js %}
<script>
  (function () {
    const currentPath = window.location.pathname || "/";
    const currentSearch = window.location.search || "";
    const currentHash = window.location.hash || "";
    const isKorean = currentPath === "/ko" || currentPath.startsWith("/ko/");

    const brand = document.querySelector(".navbar-brand .navbar-item.is-size-5.has-text-weight-bold");
    if (brand && !brand.textContent.trim()) {
      brand.textContent = "Doosan's Blog";
    }
    if (brand && isKorean) {
      brand.href = "/ko/";
    }

    const navEnd = document.querySelector(".navbar-end");
    if (!navEnd) {
      return;
    }

    const targetPath = isKorean
      ? (currentPath.replace(/^\/ko(?=\/|$)/, "") || "/")
      : (currentPath === "/" ? "/ko" : "/ko" + currentPath);

    const toggle = document.createElement("a");
    toggle.className = "navbar-item language-toggle";
    toggle.href = targetPath + currentSearch + currentHash;
    toggle.title = isKorean ? "Switch to English" : "Switch to Korean";
    toggle.setAttribute("aria-label", toggle.title);
    toggle.innerHTML = [
      '<span class="icon"><i class="fas fa-language" aria-hidden="true"></i></span>',
      '<span class="language-toggle__label">',
      isKorean ? "EN" : "KO",
      "</span>"
    ].join("");

    const searchItem = document.getElementById("nav-search");
    navEnd.insertBefore(toggle, searchItem || null);
  })();
</script>
{% endblock user_custom_js %}
