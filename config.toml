# The site theme to use.
theme = "DeepThought"

# The URL the site will be built for
base_url = "https://emptyfridge.dev"

# Default language site metadata.
title = "Doosan's Blog"
description = "Learning is an endless process"

# The default language; translated content is generated under /{code}/.
default_language = "en"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true


# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
# highlight_code = false


taxonomies = [
	{ name = "categories", feed = true, paginate_by = 10 },
	{ name = "tags", fees = true, paginate_by = 10 },
]

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

# Various slugification strategies, see below for details
# Defaults to everything being a slug
[slugify]
paths = "on"
taxonomies = "on"
anchors = "on"

[search]
# Whether to include the title of the page/section in the index
include_title = true
# Whether to include the description of the page/section in the index
include_description = true
# Whether to include the path of the page/section in the index
include_path = true
# Whether to include the rendered content of the page/section in the index
include_content = true
# At which character to truncate the content to. Useful if you have a lot of pages and the index would
# become too big to load on the site. Defaults to not being set.
# truncate_content_length = 100

[markdown]
render_emoji = true

[markdown.highlighting]
theme = "ayu-dark"
extra_grammars = [
	"syntaxes/rust-diff.tmLanguage.json",
	"syntaxes/rs-diff-alias.tmLanguage.json",
	"syntaxes/rust-diff-alias.tmLanguage.json",
]

[languages.ko]
title = "Doosan의 블로그"
description = "배움은 끝이 없는 과정"
# Korean search indexing currently panics in elasticlunr during `zola build`.
build_search_index = false
taxonomies = [
	{ name = "categories", feed = true, paginate_by = 10 },
	{ name = "tags", feed = true, paginate_by = 10 },
]

